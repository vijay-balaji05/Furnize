<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Furn — Confirm Booking</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0b0f1a;
            --surface: #0e1322;
            --card: #131929;
            --border: #1e2640;
            --border2: #2a3050;
            --accent: #c9a84c;
            --accent-hover: #dfc06a;
            --text: #e8eaf6;
            --muted: #8892b0;
            --dim: #4a5270;
            --input-bg: #0b0f1a;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            padding: 3rem 1.5rem;
        }

        /* ── Page Wrapper ── */
        .page {
            max-width: 620px;
            margin: 0 auto;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Back Link ── */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
            color: var(--muted);
            text-decoration: none;
            margin-bottom: 2rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent);
        }

        /* ── Card ── */
        .booking-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Gold top line */
        .booking-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 15%;
            right: 15%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        /* ── Card Header ── */
        .card-header {
            padding: 2.2rem 2.5rem 1.8rem;
            border-bottom: 1px solid var(--border);
        }

        .card-header .eyebrow {
            font-size: 0.68rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .card-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.1;
            color: var(--text);
        }

        .card-header p {
            font-size: 0.82rem;
            color: var(--muted);
            margin-top: 0.5rem;
            line-height: 1.6;
        }

        /* ── Form ── */
        form {
            padding: 2rem 2.5rem 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.3rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 520px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            form {
                padding: 1.5rem 1.3rem 2rem;
            }

            .card-header {
                padding: 1.8rem 1.3rem 1.5rem;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
        }

        label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--dim);
        }

        input,
        select,
        textarea {
            background: var(--input-bg);
            border: 1px solid var(--border2);
            border-radius: 10px;
            padding: 0.78rem 1rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
            -webkit-appearance: none;
        }

        input::placeholder,
        textarea::placeholder {
            color: var(--dim);
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.12);
        }

        /* Custom select arrow */
        .select-wrap {
            position: relative;
        }

        .select-wrap::after {
            content: '▾';
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 0.85rem;
            pointer-events: none;
        }

        select {
            cursor: pointer;
            padding-right: 2.5rem;
        }

        select option {
            background: #131929;
            color: var(--text);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.6;
        }

        /* ── Selected Product Preview ── */
        .product-preview {
            display: none;
            background: rgba(201, 168, 76, 0.06);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.82rem;
            color: var(--accent);
            align-items: center;
            gap: 0.5rem;
        }

        .product-preview.show {
            display: flex;
        }

        .product-preview .check {
            font-size: 1rem;
        }

        /* ── Divider ── */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--dim);
            font-size: 0.68rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .section-divider::before,
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Submit Button ── */
        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: #0b0f1a;
            border: none;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            margin-top: 0.3rem;
        }

        .btn-submit:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(201, 168, 76, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Success Message ── */
        #msg {
            text-align: center;
            font-size: 0.82rem;
            font-weight: 600;
            min-height: 1.2rem;
            letter-spacing: 0.03em;
        }
    </style>
</head>

<body>

    <div class="page">

        <a href="home.html" class="back-link">← Back to Home</a>

        <div class="booking-card">

            <div class="card-header">
                <p class="eyebrow">Step 1 of 1</p>
                <h1>Confirm Your Booking</h1>
                <p>Fill in the details below and we'll get back to you within 24 hours.</p>
            </div>

            <form id="bookingForm">

                <!-- Product Selection -->
                <div class="form-group">
                    <label>Select Product</label>
                    <div class="select-wrap">
                        <select id="product" required>
                            <option value="" disabled selected>— Choose a furniture unit —</option>
                            <option value="Pooja Unit">Pooja Unit</option>
                            <option value="TV Background Unit">TV Background Unit</option>
                            <option value="Kitchen Unit">Kitchen Unit</option>
                            <option value="Terrace Unit">Terrace Unit</option>
                            <option value="Hall Unit">Hall Unit</option>
                            <option value="Bathroom Unit">Bathroom Unit</option>
                        </select>
                    </div>
                    <!-- Preview of selected product -->
                    <div class="product-preview" id="productPreview">
                        <span class="check">✦</span>
                        <span id="productPreviewText"></span>
                    </div>
                </div>

                <div class="section-divider">Your Details</div>

                <!-- Name & Phone -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" required placeholder="e.g. Rahul Kumar" />
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phone" required placeholder="+91 98765 43210" />
                    </div>
                </div>

                <!-- Email & Date -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" required placeholder="you@email.com" />
                    </div>
                    <div class="form-group">
                        <label>Preferred Date</label>
                        <input type="date" id="date" required />
                    </div>
                </div>

                <!-- Address -->
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="address" required placeholder="Street, City, State" />
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Confirm Booking →</button>

                <p id="msg"></p>

            </form>
        </div>
    </div>

    <script>
        // Show selected product preview
        const productSelect = document.getElementById('product');
        const productPreview = document.getElementById('productPreview');
        const productPreviewText = document.getElementById('productPreviewText');

        productSelect.addEventListener('change', function () {
            if (this.value) {
                productPreviewText.textContent = this.value + ' selected';
                productPreview.classList.add('show');
            } else {
                productPreview.classList.remove('show');
            }
        });

        // Set min date to today
        const dateInput = document.getElementById('date');
        const today = new Date().toISOString().split('T')[0];
        dateInput.setAttribute('min', today);

        // Form submit
        document.getElementById('bookingForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const msg = document.getElementById('msg');

            const bookingObj = {
                name:        document.getElementById("name").value,
                phone:       document.getElementById("phone").value,
                email:       document.getElementById("email").value,
                prefferDate: document.getElementById("date").value,   // fixed: was preprefferDate
                address:     document.getElementById("address").value,
                orderType:   document.getElementById("product").value  // fixed: was product
            };

            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting…';

            fetch("http://localhost:5050/furn/addBooking", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bookingObj)
            })
            .then((response)=>{
                if(!response.ok){
                    throw new Error("Something Went Wrong❌");
                }
                return response.text();
            })
            .then(() => {
                msg.style.color = '#34d399';
                msg.textContent = '✅ Booking confirmed! We\'ll contact you within 24 hours.';
                this.reset();
                productPreview.classList.remove('show');
                setTimeout(() => location.href="home.html", 3000);
                })
                .catch(err => {
                    msg.style.color = '#e8495a';
                    msg.textContent = '❌ ' + err.message;
                })
                .finally(() => {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Confirm Booking →';
                });
        });
    </script>

</body>

</html>
