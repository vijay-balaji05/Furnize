<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furn Orders</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg:       #0b0f1a;
    --surface:  #0e1322;
    --card:     #131929;
    --border:   #1e2640;
    --border2:  #2a3050;
    --accent:   #c9a84c;
    --accent-h: #dfc06a;
    --text:     #e8eaf6;
    --muted:    #8892b0;
    --dim:      #4a5270;
    --danger:   #e8495a;
    --success:  #34d399;
}

/* ── Base ── */
body {
    min-height: 100vh;
    background: var(--bg);
    background-image:
        radial-gradient(ellipse at 20% 0%, rgba(201,168,76,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 100%, rgba(201,168,76,0.04) 0%, transparent 55%);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    padding: 2.5rem 1.5rem;
}

/* ── Container ── */
.tableContainer {
    max-width: 1100px;
    margin: 0 auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 48px rgba(0, 0, 0, 0.45);
}

/* ── Nav / Top bar ── */
#nav {
    display: flex;
    gap: 0.6rem;
    align-items: center;
    padding: 1.2rem 1.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
}

#nav::before {
    content: "Booking Orders";
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
    margin-right: auto;
    /* On very small screens this takes full width and pushes buttons below */
    flex-shrink: 0;
}

#nav button {
    padding: 0.5rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: 7px;
    border: 1px solid var(--border2);
    background: var(--card);
    color: var(--text);
    transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
    white-space: nowrap;
}

#nav button:hover  { background: var(--border2); }
#nav button:active { transform: scale(0.97); }

#nav button#load {
    background: var(--accent);
    color: #0b0f1a;
    border-color: var(--accent);
    box-shadow: 0 2px 12px rgba(201,168,76,0.25);
}

#nav button#load:hover {
    background: var(--accent-h);
    box-shadow: 0 4px 20px rgba(201,168,76,0.4);
}

/* ── Table scroll wrapper ── */
.table-scroll {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}

/* ── Table ── */
.tableContainer > table,
.table-scroll > table {
    width: 100%;
    border-collapse: collapse;
    min-width: 580px; /* prevents columns from squashing before scroll kicks in */
}

/* ── Table head ── */
thead th {
    padding: 0.8rem 1.1rem;
    background: var(--surface);
    color: var(--muted);
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
}

/* ── Table body ── */
tbody td {
    padding: 0.9rem 1.1rem;
    font-size: 0.83rem;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
}

tbody tr:last-child td { border-bottom: none; }
tbody tr { transition: background 0.12s; }
tbody tr:hover { background: rgba(255,255,255,0.028); }

/* ID column */
tbody td:first-child {
    font-family: monospace;
    font-size: 0.74rem;
    color: var(--dim);
}

/* Name column */
tbody td:nth-child(2) {
    color: var(--text);
    font-weight: 500;
}

/* Email & phone */
tbody td:nth-child(3),
tbody td:nth-child(4) {
    font-family: monospace;
    font-size: 0.78rem;
    letter-spacing: 0.02em;
}

/* Order type */
tbody td:nth-child(6) {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.06em;
    text-transform: uppercase;
}

/* ── Message ── */
#message {
    padding: 0.75rem 1.5rem 1rem;
    font-size: 0.82rem;
    font-weight: 600;
    min-height: 2.4rem;
    letter-spacing: 0.01em;
}

/* ══════════════════════════════
   RESPONSIVE
══════════════════════════════ */

/* ── Tablet landscape — 1024px ── */
@media (max-width: 1024px) {
    body {
        padding: 2rem 1.25rem;
    }

    .tableContainer {
        border-radius: 14px;
    }

    thead th,
    tbody td {
        padding: 0.8rem 1rem;
    }
}

/* ── Tablet portrait — 768px ── */
@media (max-width: 768px) {
    body {
        padding: 1.5rem 1rem;
    }

    #nav {
        padding: 1rem 1.1rem;
        gap: 0.5rem;
    }

    /* Title takes full row, buttons sit below */
    #nav::before {
        width: 100%;
        font-size: 1.2rem;
        margin-bottom: 0.25rem;
    }

    #nav button {
        flex: 1;
        justify-content: center;
        font-size: 0.76rem;
        padding: 0.5rem 0.75rem;
    }

    thead th,
    tbody td {
        padding: 0.75rem 0.85rem;
        font-size: 0.78rem;
    }

    #message {
        padding: 0.65rem 1rem 0.85rem;
        font-size: 0.78rem;
    }
}

/* ── Mobile — 480px ── */
@media (max-width: 480px) {
    body {
        padding: 0.85rem 0.6rem;
    }

    .tableContainer {
        border-radius: 10px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    #nav {
        padding: 0.85rem 0.9rem;
        gap: 0.4rem;
    }

    #nav::before {
        font-size: 1.1rem;
    }

    #nav button {
        font-size: 0.72rem;
        padding: 0.45rem 0.6rem;
    }

    thead th {
        padding: 0.65rem 0.7rem;
        font-size: 0.6rem;
        letter-spacing: 0.1em;
    }

    tbody td {
        padding: 0.65rem 0.7rem;
        font-size: 0.75rem;
    }

    /* Tighten monospace columns on small screens */
    tbody td:nth-child(3),
    tbody td:nth-child(4) {
        font-size: 0.7rem;
        letter-spacing: 0;
    }

    #message {
        padding: 0.55rem 0.9rem 0.75rem;
        font-size: 0.75rem;
        min-height: 2rem;
    }
}

/* ── Extra small — 360px ── */
@media (max-width: 360px) {
    #nav::before {
        font-size: 1rem;
    }

    #nav button {
        font-size: 0.68rem;
        padding: 0.4rem 0.5rem;
    }

    tbody td {
        font-size: 0.7rem;
        padding: 0.55rem 0.6rem;
    }
}
    </style>
</head>
<body>
    <div class="tableContainer">
        <div id="nav">
            <button onclick="history.back()">🔙 Back</button>
            <button id="refresh">🔃 Refresh</button>
            <button id="load">🙍‍♂️ Load Data</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Address</th>
                    <th>Order-Type</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="body">
                <tr>
                    <td colspan="7" style="text-align:center; color:#8892b0;">Click "Load Data" to fetch orders</td>
                </tr>
            </tbody>
        </table>
        <p id="message"></p>
    </div>

    <script>
       function maskField(str) {
    if (!str) return "—";                // null or undefined
    str = String(str);                    // convert to string if it's number
    if (str.length <= 5) return str[0] + "***" + str.slice(-1);
    return str.slice(0,2) + "***" + str.slice(-3);
}

        const loadBtn = document.getElementById("load");
        const refreshBtn = document.getElementById("refresh");
        const body = document.getElementById("body");
        const msg = document.getElementById("message");

        loadBtn.addEventListener("click", function(e){
            e.preventDefault();

            fetch("http://localhost:5050/furn/getOrders")
            .then(response => {
                if(!response.ok) throw new Error("Server Error ❌");
                return response.json();
            })
            .then(data => {
                body.innerHTML = "";
                if(data.length === 0){
                    body.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#8892b0;">No orders found</td></tr>`;
                    return;
                }

                data.forEach(order => {
                    const row = document.createElement("tr");
                    row.innerHTML = `
                        <td>${order.orderId}</td>
                        <td>${order.name}</td>
                        <td>${maskField(order.email)}</td>
                        <td>${maskField(order.phone)}</td>
                        <td>${order.address}</td>
                        <td>${order.orderType}</td>
                        <td>${order.prefferDate}</td>
                    `;
                    body.appendChild(row);
                });

                msg.innerText = "✅ Orders Loaded";
                msg.style.color = "lightgreen";
                setTimeout(()=> msg.innerText="", 2000);
            })
            .catch(error => {
                console.error(error);
                msg.innerText = "❌ " + error.message;
                msg.style.color = "red";
                setTimeout(()=> msg.innerText="", 3000);
            });
        });

        refreshBtn.addEventListener("click", function(){
            location.reload();
        });
    </script>
</body>
</html>
