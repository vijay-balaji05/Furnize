<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feedback</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
/* ===============================
   PAGE BACKGROUND
================================ */
 :root {
      --bg: #0b0f1a;
      --cream: #131929;
      --ink: #e8eaf6;
      --mid: #8892b0;
      --accent: #c9a84c;
      --accent-light: #1e1a08;
      --white: #131929;
      --shadow: 0 4px 24px rgba(0,0,0,0.45);
      --shadow-hover: 0 16px 48px rgba(201,168,76,0.18);
      --radius: 16px;
    }
    :root {
  --sidebar-w: 250px;

  --surface: #0e1322;
  --card: #1e2640;
  --border: #1e2640;
  --border2: #2a3050;

  --text: #e8eaf6;
  --muted: #8892b0;
  --dim: #4a5270;

  --accent-dim: rgba(201,168,76,0.1);
}

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      padding: 0;
      min-height: 100vh;
    }

     /* ══════════════════════════════
       SIDEBAR
    ══════════════════════════════ */
    .sidebar {
      position: fixed;
      top: 58px; left: 0;
      width: var(--sidebar-w);
      height: calc(100vh - 58px);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 2rem 1.5rem;
      z-index: 300;
      transform: translateX(-100%);
      transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
      overflow-y: auto;
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .sidebar-logo span { color: var(--accent); }

    .sidebar-tagline {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      margin-top: 0.2rem;
      margin-bottom: 2.5rem;
    }

    .nav-label {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      margin: 1rem 0 0.4rem 0.6rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.72rem 0.9rem;
      border-radius: 10px;
      font-size: 0.87rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: background 0.15s, color 0.15s, transform 0.15s;
      position: relative;
    }
    .nav-item .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
    .nav-item:hover    { background: var(--card); color: var(--text); transform: translateX(4px); }
    .nav-item.active   { background: var(--accent-dim); color: var(--accent); }
    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 20%; bottom: 20%;
      width: 3px;
      background: var(--accent);
      border-radius: 0 3px 3px 0;
    }

    .sidebar-sep { height: 1px; background: var(--border); margin: 1rem 0; }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
    }
    .sidebar-footer p {
      font-size: 0.72rem;
      color: var(--dim);
      margin-bottom: 0.8rem;
      line-height: 1.5;
    }
    .btn-sidebar-cta {
      display: block;
      width: 100%;
      padding: 0.75rem;
      background: var(--accent);
      color: #0b0f1a;
      text-align: center;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.82rem;
      border-radius: 9px;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .btn-sidebar-cta:hover {
      background: #dfc06a;
      box-shadow: 0 4px 18px rgba(201,168,76,0.3);
    }

    /* Hamburger */
    /* ══════════════════════════════
       TOP NAVBAR
    ══════════════════════════════ */
    .topnav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 58px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      z-index: 400;
      gap: 1rem;
    }

    .topnav-toggle {
      width: 40px; height: 40px;
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
      color: var(--text);
    }
    .topnav-toggle:hover  { background: var(--border); border-color: var(--accent); }
    .topnav-toggle.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .topnav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    .topnav-logo span { color: var(--accent); }

    .topnav-links {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      margin-left: 1.5rem;
    }

    .topnav-link {
      padding: 0.45rem 0.9rem;
      border-radius: 8px;
      font-size: 0.83rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .topnav-link:hover  { background: var(--card); color: var(--text); }
    .topnav-link.active { color: var(--accent); background: var(--accent-dim); }

    .topnav-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .topnav-cta {
      padding: 0.5rem 1.2rem;
      background: var(--accent);
      color: #0b0f1a;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .topnav-cta:hover { background: #dfc06a; }

    @media (max-width: 640px) { .topnav-links { display: none; } }

    .hamburger { display: none; }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 250;
    }
    .overlay.show { display: block; }


/* ===============================
   PAGE CONTENT WRAPPER
================================ */

body {
  padding-top: 90px; /* space for fixed navbar */
  display: flex;
  justify-content: center;
}

/* ===============================
   IMPROVED FEEDBACK CARD
================================ */

.container {
  width: 440px;
  background: linear-gradient(145deg, #1b2338, #161d2e);
  border-radius: 18px;
  border: 1px solid #2a3050;
  box-shadow:
    0 20px 60px rgba(0,0,0,0.7),
    0 0 0 1px rgba(255,255,255,0.03);
  overflow: hidden;
  position: relative;
  transition: all 0.4s ease;
}

/* Accent Side Glow */
.container::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 4px;
  background: linear-gradient(to bottom, #c9a84c, transparent);
}

.container:hover {
  transform: translateY(-6px);
  box-shadow:
    0 30px 80px rgba(0,0,0,0.85),
    0 0 25px rgba(201,168,76,0.25);
}

/* ===============================
   HEADER
================================ */

.card-header {
  padding: 26px;
  background: transparent;
  border-bottom: 1px solid #2a3050;
  text-align: center;
}

.card-header h2 {
  margin: 0;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 22px;
  letter-spacing: 1px;
  color: var(--accent);
}

/* ===============================
   BODY
================================ */

.card-body {
  padding: 32px;
}

.tag-line {
  text-align: center;
  font-size: 13px;
  letter-spacing: 0.5px;
  color: var(--muted);
  margin-bottom: 24px;
}

/* ===============================
   INPUT IMPROVEMENTS
================================ */

.form-group input,
.form-group textarea {
  background: #0f1629;
  border: 1px solid #2a3050;
  border-radius: 12px;
}

.form-group input:focus,
.form-group textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 15px rgba(201,168,76,0.3);
}

/* ===============================
   BUTTON POLISH\
   

================================ */

#submitButton {
  padding: 10px 22px;
  border-radius: 30px;
}

.btn-reset {
  border-radius: 30px;
}

/* ===============================
   HEADER
================================ */

.card-header {
  padding: 22px;
  text-align: center;
  background: #111827;
  border-bottom: 1px solid #2e3a52;
}

.card-header h2 {
  margin: 0;
  font-weight: 600;
  letter-spacing: 1px;
  font-size: 20px;
  color: #c9a84c;
}

/* ===============================
   BODY
================================ */
.card-body {
  padding: 28px;
}


.tag-line {
  text-align: center;
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 20px;
}

/* ===============================
   FORM
================================ */
.form-group {
  margin-bottom: 18px;
}

.form-group label {
  display: block;
  font-size: 14px;
  margin-bottom: 6px;
  color: #cbd5e1;
}

.form-group input,
.form-group textarea {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-size: 14px;
  transition: all 0.3s ease;
}

.form-group input:focus,
.form-group textarea:focus {
  outline: none;
  border: 1px solid #c9a84c;
  box-shadow: 0 0 10px rgba(201,168,76,0.4);
}

/* TEXTAREA */
textarea {
  resize: none;
  min-height: 100px;
}

/* CHAR COUNT */
.char-count {
  display: block;
  text-align: right;
  font-size: 12px;
  margin-top: 4px;
  color: #94a3b8;
}

/* ===============================
   BUTTONS
================================ */
.btn-row {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
}

button {
  padding: 10px 18px;
  border-radius: 25px;
  border: none;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
}

#submitButton {
  background: linear-gradient(135deg, #c9a84c, #a88b3c);
  color: #111;
  font-weight: 600;
}

#submitButton:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(201,168,76,0.4);
}

.btn-reset {
  background: rgba(255,255,255,0.08);
  color: #fff;
}

.btn-reset:hover {
  background: rgba(255,255,255,0.15);
}

/* ===============================
   SUCCESS MESSAGE
================================ */
.success-message {
  margin-top: 15px;
  text-align: center;
  font-size: 14px;
  color: #4ade80;
}


/* ===============================
   FOOTER
================================ */

.card-footer {
  padding: 16px;
  background: #111827;
  border-top: 1px solid #2e3a52;
  text-align: center;
}

.dot {
  height: 8px;
  width: 8px;
  background: #c9a84c;
  border-radius: 50%;
  display: inline-block;
  margin: 0 3px;
  animation: pulse 1.5s infinite;
}

.dot:nth-child(2) {
  animation-delay: 0.2s;
}

.dot:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes pulse {
  0% {opacity: 0.3;}
  50% {opacity: 1;}
  100% {opacity: 0.3;}
}

.footer-text {
  display: block;
  margin-top: 8px;
  font-size: 12px;
  color: #94a3b8;
}
  </style>
</head>
<body>

    <!-- Overlay -->
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- ══ TOP NAVBAR ══ -->
  <nav class="topnav">
    <button class="topnav-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="Toggle Menu">☰</button>
    <h3>Furnize...</h3>
    <div class="topnav-links">
      <a class="topnav-link active" href="home.html">Home</a>
      <a class="topnav-link" href="products.html">Products</a>
      <a class="topnav-link" href="book.html">Other Bookings</a>
      <a class="topnav-link" href="feedBack.html">FeedBack</a>
      <a class="topnav-link" href=dashBoard.html">Dashboard</a>
    </div>
    <div class="topnav-right">
      <h3>🛠</h3>
    </div>
  </nav>

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">Furnize...<span>.</span></div>

    <p class="nav-label">Service</p>
    <a class="nav-item active" href="home.html"><span class="nav-icon">🏠</span> Home</a>
    <a class="nav-item" href="products.html"><span class="nav-icon">🪑</span> Products</a>
    <a class="nav-item" href="feedBack.html"><span class="nav-icon">👉</span> FeedBack</a>
    <a class="nav-item" href="book.html"><span class="nav-icon">🗂</span> Other Bookings</a>
    <a class="nav-item" href="dashBoard.html"><span class="nav-icon">🙍‍♂️</span> DashBoard</a>

    <div class="sidebar-sep"></div>


  </aside>

  <div class="container">
    <div class="card-header">
      <h2>Furn Feedback</h2>
    </div>

    <div class="card-body">
      <p class="tag-line">We read every message</p>

      <form id="feedbackForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required placeholder="your@email.com"/>
        </div>

        <div class="form-group">
          <label>Message</label>
          <textarea id="message" required placeholder="Write your feedback..." maxlength="300" style="background-color: white;color: black;"></textarea>
          <span class="char-count" id="charCount">0 / 300</span>
        </div>

        <div class="btn-row">
          <button type="submit" id="submitButton">→ Submit</button>
          <button type="button" class="btn-reset" id="resetBtn">Clear</button>
        </div>

        <div class="success-message">
          <p id="msg"></p>
        </div>
      </form>
    </div>

    <div class="card-footer">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="footer-text">Response within 24h</span>
    </div>
  </div>

  <script>
    const form = document.getElementById("feedbackForm");
    const textarea = document.getElementById("message");
    const charCount = document.getElementById("charCount");
    const msg = document.getElementById("msg");
    const submitBtn = document.getElementById("submitButton");

    // Live character counter
    textarea.addEventListener("input", () => {
      charCount.textContent = `${textarea.value.length} / 300`;
    });

    // Clear button
    document.getElementById("resetBtn").addEventListener("click", () => {
      form.reset();
      charCount.textContent = "0 / 300";
      msg.textContent = "";
      msg.style.color = "";
    });

    // Single submit handler — posts to backend
    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const feedBackObj = {
        email: document.getElementById("email").value,
        messege: document.getElementById("message").value
      };

      // Disable button while request is in flight
      submitBtn.disabled = true;
      submitBtn.textContent = "Sending…";

      fetch("http://localhost:5050/furn/feedBack/addFeedBack", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(feedBackObj)
      })
        .then((response) => {
          if (response.status === 201) return response.text();
          if (response.status === 208) throw new Error("Email already submitted feedback");
          throw new Error("Something went wrong");
        })
        .then(() => {
          msg.textContent = "✅ Feedback Submitted Successfully";
          msg.style.color = "green";
          form.reset();
          charCount.textContent = "0 / 300";
          setTimeout(() => {
          
          msg.innerText="";
          location.href="home.html";
          },2000
          );
        })
        .catch((error) => {
          msg.textContent = "❌ " + error.message;
          msg.style.color = "var(--red)";
        })
        .finally(() => {
          submitBtn.disabled = false;
          submitBtn.textContent = "→ Submit";
        });
    });

       /* ==============================
     SIDEBAR TOGGLE
  ============================== */
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  const mainContent = document.getElementById("mainContent");
  const toggleBtn = document.getElementById("sidebarToggle");

  function toggleSidebar() {
    sidebar.classList.toggle("open");
    overlay.classList.toggle("show");
    mainContent.classList.toggle("shifted");
    toggleBtn.classList.toggle("active");
  }

  function closeSidebar() {
    sidebar.classList.remove("open");
    overlay.classList.remove("show");
    mainContent.classList.remove("shifted");
    toggleBtn.classList.remove("active");
  }

  </script>

</body>
</html>
